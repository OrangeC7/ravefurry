<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FURATIC Moderator</title>
    <meta name="theme-color" content="#050816">
    <link rel="icon" href="{{ furatic_logo_url }}" type="image/svg+xml">
    <link rel="shortcut icon" href="{{ furatic_logo_url }}" type="image/svg+xml">
    <style>
      :root {
        color-scheme: dark;
        --bg: #050816;
        --bg-top: #091022;
        --bg-bottom: #03040b;
        --text: #eef4ff;
        --muted: rgba(238, 244, 255, 0.70);
        --line: rgba(255, 255, 255, 0.12);
        --line-strong: rgba(255, 255, 255, 0.18);
        --panel: rgba(7, 10, 22, 0.32);
        --panel-strong: rgba(7, 10, 22, 0.52);
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.46);
        --radius: 24px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background:
          radial-gradient(circle at top, rgba(16, 24, 52, 0.88) 0%, rgba(5, 8, 22, 0.96) 48%, rgba(3, 4, 11, 1) 100%),
          linear-gradient(180deg, var(--bg-top) 0%, var(--bg) 56%, var(--bg-bottom) 100%);
        color: var(--text);
        font-family: Inter, Roboto, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
        background-attachment: fixed;
      }

      body {
        overflow-x: hidden;
      }

      .page {
        min-height: 100svh;
        padding: 16px;
      }

      .shell {
        width: min(100%, 1220px);
        margin: 0 auto;
        display: grid;
        gap: 16px;
      }

      .panel {
        border-radius: var(--radius);
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: var(--shadow);
        -webkit-backdrop-filter: blur(20px) saturate(120%);
        backdrop-filter: blur(20px) saturate(120%);
      }

      .hero {
        padding: 18px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
        align-items: center;
      }

      .hero img {
        display: block;
        width: min(100%, 340px);
        max-width: 100%;
        height: auto;
        filter:
          drop-shadow(0 12px 30px rgba(0, 0, 0, 0.28))
          drop-shadow(0 0 16px rgba(0, 142, 248, 0.10));
      }

      .hero-actions {
        display: flex;
        justify-content: flex-end;
        align-items: center;
      }
      
      .toolbar {
        display: flex;
        flex-wrap: nowrap;
        align-items: center;
        gap: 10px;
        overflow-x: auto;
      }

      .button,
      button {
        appearance: none;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        border-radius: 14px;
        padding: 11px 14px;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          background 180ms ease,
          box-shadow 180ms ease,
          opacity 180ms ease;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .button:hover,
      button:hover {
        transform: translateY(-1px);
        border-color: var(--line-strong);
        background: rgba(255, 255, 255, 0.09);
      }

      .button:active,
      button:active {
        transform: translateY(0);
      }

      .button.subtle {
        background: rgba(255, 255, 255, 0.05);
      }

      .button.good,
      button.good {
        background: linear-gradient(135deg, rgba(74, 227, 0, 0.22), rgba(0, 142, 248, 0.14));
        border-color: rgba(74, 227, 0, 0.34);
      }

      .button.warn,
      button.warn {
        background: linear-gradient(135deg, rgba(222, 104, 0, 0.24), rgba(200, 0, 224, 0.16));
        border-color: rgba(222, 104, 0, 0.34);
      }

      .button:disabled,
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
      }

      .segmented {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .segmented button.active {
        background: linear-gradient(135deg, rgba(0, 142, 248, 0.24), rgba(200, 0, 224, 0.16));
        border-color: rgba(0, 142, 248, 0.38);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) minmax(320px, 0.95fr);
        gap: 16px;
        align-items: start;
      }

      .stack {
        display: grid;
        gap: 16px;
      }

      .section {
        padding: 18px;
        display: grid;
        gap: 14px;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .section h2 {
        margin: 0;
        font-size: 20px;
        letter-spacing: -0.03em;
      }

      .token {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 38px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.05);
        color: rgba(255, 255, 255, 0.94);
        font-size: 13px;
      }

      .song-card,
      .queue-item,
      .ban-item {
        display: grid;
        gap: 12px;
        padding: 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.045);
      }

      .song-title,
      .queue-title {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: -0.03em;
        word-break: break-word;
      }

      .song-meta,
      .queue-copy {
        display: grid;
        gap: 10px;
        min-width: 0;
      }

      .meta-row,
      .queue-title-row,
      .queue-actions,
      .ban-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .queue-item {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
      }

      .queue-artist {
        color: var(--muted);
      }

      .queue-actions,
      .ban-actions {
        justify-content: flex-end;
      }

      .queue-actions button,
      .ban-actions button {
        min-width: 116px;
      }

      .manual-ban {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
      }

      input[type="text"] {
        width: 100%;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        border-radius: 14px;
        padding: 13px 14px;
        font: inherit;
        outline: none;
        transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
      }

      input[type="text"]::placeholder {
        color: rgba(238, 244, 255, 0.56);
      }

      input[type="text"]:focus {
        border-color: rgba(0, 142, 248, 0.42);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 0 4px rgba(0, 142, 248, 0.12);
      }

      .empty-state {
        padding: 16px;
        border-radius: 16px;
        border: 1px dashed rgba(255, 255, 255, 0.18);
        color: var(--muted);
        background: rgba(255, 255, 255, 0.03);
      }

      .toast {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 10;
        min-width: min(420px, calc(100vw - 32px));
        max-width: 520px;
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(8, 12, 22, 0.90);
        border: 1px solid var(--line);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
        -webkit-backdrop-filter: blur(16px);
        backdrop-filter: blur(16px);
        opacity: 0;
        transform: translateY(14px);
        pointer-events: none;
        transition: opacity 180ms ease, transform 180ms ease;
      }

      .toast.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .toast.good {
        border-color: rgba(74, 227, 0, 0.35);
      }

      .toast.warn {
        border-color: rgba(222, 104, 0, 0.35);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 980px) {
        .hero {
          grid-template-columns: 1fr;
        }

        .hero-actions {
          justify-content: flex-start;
        }

        .layout {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 720px) {
        .page {
          padding: 10px;
        }

        .hero,
        .section {
          padding: 14px;
        }

        .queue-item {
          grid-template-columns: 1fr;
        }

        .queue-actions,
        .ban-actions {
          justify-content: flex-start;
        }

        .manual-ban {
          grid-template-columns: 1fr;
        }

        .segmented {
          width: 100%;
        }

        .segmented button {
          flex: 1 1 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="shell">
        <section class="panel hero">
          <img src="{{ furatic_logo_wide_url }}" alt="FURATIC logo">
          <div class="hero-actions">
            <div class="toolbar" aria-label="Moderator controls">
              <button id="event-mode-button" class="active" type="button">Event mode</button>
              <button id="afterhours-mode-button" type="button">After-hours mode</button>
              <a class="button subtle" href="/accounts/logout/">Log out</a>
            </div>
          </div>
        </section>

        <div class="layout">
          <div class="stack">
            <section class="panel section">
              <div class="section-head">
                <h2>Current song</h2>
                <div class="token" id="current-mode-token">Mode: —</div>
              </div>
              <div id="current-song-card" class="song-card">
                <div class="song-title">Nothing is currently playing.</div>
              </div>
            </section>

            <section class="panel section">
              <div class="section-head">
                <h2>Queue</h2>
                <div class="token"><span id="queue-count">0</span>&nbsp;queued</div>
              </div>
              <div id="queue-list" class="stack">
                <div class="empty-state">The queue is currently empty.</div>
              </div>
            </section>
          </div>

          <section class="panel section">
            <div class="section-head">
              <h2>Banned IPs</h2>
              <div class="token"><span id="banned-count">0</span>&nbsp;active</div>
            </div>

            <label class="sr-only" for="manual-ban-input">Ban IP address</label>
            <div class="manual-ban">
              <input
                id="manual-ban-input"
                type="text"
                inputmode="text"
                spellcheck="false"
                placeholder="Ban an IP directly"
              >
              <button id="manual-ban-button" class="warn" type="button">Ban IP</button>
            </div>

            <div id="ban-list" class="stack">
              <div class="empty-state">No IPs are currently banned.</div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script>
      const CSRF_TOKEN = "{{ csrf_token }}";
      const MODERATOR_STATE_URL = "{{ moderator_state_url }}";
      const MODERATOR_REMOVE_SONG_URL = "{{ moderator_remove_song_url }}";
      const MODERATOR_BAN_IP_URL = "{{ moderator_ban_ip_url }}";
      const MODERATOR_UNBAN_IP_URL = "{{ moderator_unban_ip_url }}";
      const MODERATOR_SITE_MODE_URL = "{{ moderator_site_mode_url }}";
      const MODERATOR_SKIP_CURRENT_URL = "{{ moderator_skip_current_url }}";

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function showToast(message, tone) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.className = "toast visible" + (tone ? " " + tone : "");
        window.clearTimeout(showToast._timer);
        showToast._timer = window.setTimeout(function () {
          toast.className = "toast";
        }, 3400);
      }

      async function postForm(url, data) {
        const body = new URLSearchParams(data);
        const response = await fetch(url, {
          method: "POST",
          credentials: "same-origin",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8",
            "X-CSRFToken": CSRF_TOKEN,
            "X-Requested-With": "XMLHttpRequest"
          },
          body: body.toString(),
        });

        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || "Request failed");
        }
        return response.json();
      }

      function renderMode(mode) {
        const prettyMode = mode === "afterhours" ? "After-hours" : "Event";
        document.getElementById("current-mode-token").textContent = "Mode: " + prettyMode;
        document.getElementById("event-mode-button").classList.toggle("active", mode === "event");
        document.getElementById("afterhours-mode-button").classList.toggle("active", mode === "afterhours");
      }

      function renderCurrentSong(song) {
        const container = document.getElementById("current-song-card");
        if (!song) {
          container.innerHTML = '<div class="song-title">Nothing is currently playing.</div>';
          return;
        }

        const requesterIp = song.requesterIp ? escapeHtml(song.requesterIp) : "Unknown";
        const banDisabled = song.requesterIp ? "" : " disabled";

        container.innerHTML = [
          '<div class="song-title">' + escapeHtml(song.title || song.displayName || "Untitled") + '</div>',
          '<div class="song-meta">',
            '<div class="meta-row">',
              '<span class="token">Artist: ' + escapeHtml(song.artist || "Unknown") + '</span>',
              '<span class="token">Votes: ' + escapeHtml(song.votes) + '</span>',
              '<span class="token">Length: ' + escapeHtml(song.durationFormatted || "—") + '</span>',
            '</div>',
            '<div class="meta-row">',
              '<span class="token">Requester IP: ' + requesterIp + '</span>',
            '</div>',
          '</div>',
          '<div class="queue-actions">',
            '<button class="warn" type="button" data-action="skip-current">Skip current song</button>',
            '<button class="warn" type="button" data-action="ban-current" data-ip="' + escapeHtml(song.requesterIp || "") + '"' + banDisabled + '>Ban requester</button>',
          '</div>'
        ].join("");
      }

      function renderQueue(queue) {
        const list = document.getElementById("queue-list");
        document.getElementById("queue-count").textContent = String(queue.length);

        if (!queue.length) {
          list.innerHTML = '<div class="empty-state">The queue is currently empty.</div>';
          return;
        }

        list.innerHTML = queue.map(function (song, index) {
          const requesterIp = song.requesterIp ? escapeHtml(song.requesterIp) : "Unknown";
          const banDisabled = song.requesterIp ? "" : " disabled";
          return [
            '<article class="queue-item">',
              '<div class="queue-copy">',
                '<div class="queue-title-row">',
                  '<span class="token">#' + (index + 1) + '</span>',
                  '<div class="queue-title">' + escapeHtml(song.title || song.displayName || "Untitled") + '</div>',
                '</div>',
                '<div class="queue-artist">' + escapeHtml(song.artist || "Unknown") + '</div>',
                '<div class="meta-row">',
                  '<span class="token">Votes: ' + escapeHtml(song.votes) + '</span>',
                  '<span class="token">Length: ' + escapeHtml(song.durationFormatted || "—") + '</span>',
                  '<span class="token">Requester IP: ' + requesterIp + '</span>',
                '</div>',
              '</div>',
              '<div class="queue-actions">',
                '<button class="warn" type="button" data-action="remove-song" data-key="' + escapeHtml(song.queueKey) + '">Remove</button>',
                '<button class="button subtle" type="button" data-action="ban-song-ip" data-key="' + escapeHtml(song.queueKey) + '" data-ip="' + escapeHtml(song.requesterIp || "") + '"' + banDisabled + '>Ban requester</button>',
              '</div>',
            '</article>'
          ].join("");
        }).join("");
      }

      function renderBanList(ips) {
        const list = document.getElementById("ban-list");
        document.getElementById("banned-count").textContent = String(ips.length);

        if (!ips.length) {
          list.innerHTML = '<div class="empty-state">No IPs are currently banned.</div>';
          return;
        }

        list.innerHTML = ips.map(function (ip) {
          return [
            '<article class="ban-item">',
              '<div class="queue-title">' + escapeHtml(ip) + '</div>',
              '<div class="ban-actions">',
                '<button class="good" type="button" data-action="unban-ip" data-ip="' + escapeHtml(ip) + '">Unban IP</button>',
              '</div>',
            '</article>'
          ].join("");
        }).join("");
      }

      function renderState(data) {
        renderMode(data.mode || "event");
        renderCurrentSong(data.currentSong || null);
        renderQueue(Array.isArray(data.queue) ? data.queue : []);
        renderBanList(Array.isArray(data.bannedIps) ? data.bannedIps : []);
      }

      let refreshInFlight = false;
      async function refreshState() {
        if (refreshInFlight) {
          return;
        }
        refreshInFlight = true;
        try {
          const response = await fetch(MODERATOR_STATE_URL, {
            credentials: "same-origin",
            cache: "no-store",
            headers: { "X-Requested-With": "XMLHttpRequest" },
          });
          if (!response.ok) {
            throw new Error(await response.text());
          }
          const data = await response.json();
          renderState(data);
        } catch (error) {
          showToast(error.message || "Unable to refresh moderator state.", "warn");
        } finally {
          refreshInFlight = false;
        }
      }

      async function removeSong(key) {
        await postForm(MODERATOR_REMOVE_SONG_URL, { key: key });
        showToast("Song removed.", "good");
        await refreshState();
      }

      async function banIp(ip, queueKey) {
        const payload = {};
        if (ip) payload.ip = ip;
        if (queueKey) payload.queue_key = queueKey;
        await postForm(MODERATOR_BAN_IP_URL, payload);
        showToast("IP address banned.", "warn");
        await refreshState();
      }

      async function unbanIp(ip) {
        await postForm(MODERATOR_UNBAN_IP_URL, { ip: ip });
        showToast("IP address unbanned.", "good");
        await refreshState();
      }

      async function setMode(mode) {
        const data = await postForm(MODERATOR_SITE_MODE_URL, { mode: mode });
        renderMode(data.mode || mode);
        showToast(
          mode === "afterhours" ? "After-hours mode enabled." : "Event mode enabled.",
          mode === "afterhours" ? "warn" : "good"
        );
        await refreshState();
      }

      async function skipCurrentSong() {
        await postForm(MODERATOR_SKIP_CURRENT_URL, {});
        showToast("Current song skipped.", "good");
        await refreshState();
      }
      
      document.addEventListener("click", async function (event) {
        const button = event.target.closest("button[data-action]");
        if (!button) return;

        try {
          if (button.disabled) return;
          button.disabled = true;
          const action = button.getAttribute("data-action");

          if (action === "remove-song") {
            await removeSong(button.getAttribute("data-key"));
          } else if (action === "skip-current") {
            await skipCurrentSong();
          } else if (action === "ban-song-ip") {
            await banIp(button.getAttribute("data-ip"), button.getAttribute("data-key"));
          } else if (action === "ban-current") {
            await banIp(button.getAttribute("data-ip"), "");
          } else if (action === "unban-ip") {
            await unbanIp(button.getAttribute("data-ip"));
          }
        } catch (error) {
          showToast(error.message || "Action failed.", "warn");
        } finally {
          button.disabled = false;
        }
      });

      document.getElementById("event-mode-button").addEventListener("click", function () {
        setMode("event").catch(function (error) {
          showToast(error.message || "Unable to switch mode.", "warn");
        });
      });

      document.getElementById("afterhours-mode-button").addEventListener("click", function () {
        setMode("afterhours").catch(function (error) {
          showToast(error.message || "Unable to switch mode.", "warn");
        });
      });

      document.getElementById("manual-ban-button").addEventListener("click", function () {
        const input = document.getElementById("manual-ban-input");
        const value = input.value.trim();
        if (!value) {
          showToast("Enter an IP address to ban.", "warn");
          return;
        }
        banIp(value, "")
          .then(function () {
            input.value = "";
          })
          .catch(function (error) {
            showToast(error.message || "Unable to ban IP.", "warn");
          });
      });

      document.getElementById("manual-ban-input").addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          event.preventDefault();
          document.getElementById("manual-ban-button").click();
        }
      });

      refreshState();
      window.setInterval(refreshState, 6000);
    </script>
  </body>
</html>
