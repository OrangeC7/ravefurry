<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FURATIC</title>
    <meta name="theme-color" content="#050816">
    <link rel="icon" href="{{ furatic_logo_url }}" type="image/svg+xml">
    <link rel="shortcut icon" href="{{ furatic_logo_url }}" type="image/svg+xml">
    <link rel="mask-icon" href="{{ furatic_logo_url }}" color="#008ef8">
    <style>
      :root {
        color-scheme: dark;
        --bg: #050816;
        --bg-top: #091022;
        --bg-bottom: #03040b;
        --text: #eef4ff;
        --muted: rgba(238, 244, 255, 0.72);
        --line: rgba(255, 255, 255, 0.12);
        --panel: rgba(7, 10, 22, 0.28);
        --panel-strong: rgba(7, 10, 22, 0.54);
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.46);
        --radius: 26px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background:
          radial-gradient(circle at top, rgba(16, 24, 52, 0.92) 0%, rgba(5, 8, 22, 0.96) 48%, rgba(3, 4, 11, 1) 100%),
          linear-gradient(180deg, var(--bg-top) 0%, var(--bg) 56%, var(--bg-bottom) 100%);
        color: var(--text);
        font-family: Inter, Roboto, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
        background-attachment: fixed;
      }

      body {
        overflow-x: hidden;
      }

      .page {
        min-height: 100svh;
        padding: 18px 16px 24px;
        display: grid;
        place-items: start center;
      }

      .shell {
        width: min(100%, 1080px);
        display: grid;
        gap: 14px;
      }

      .brand {
        display: grid;
        justify-items: center;
        gap: 12px;
        text-align: center;
      }

      .brand img {
        display: block;
        width: min(100%, 540px);
        max-width: 100%;
        height: auto;
        margin: 0 auto;
        filter:
          drop-shadow(0 16px 38px rgba(0, 0, 0, 0.30))
          drop-shadow(0 0 18px rgba(0, 142, 248, 0.12));
      }

      .notify-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
      }

      .notify-button,
      .tv-button,
      .mini-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
        border-radius: 14px;
        color: var(--text);
        text-decoration: none;
        font: inherit;
        font-weight: 700;
        letter-spacing: 0.01em;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.06);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.04),
          0 12px 28px rgba(0, 0, 0, 0.22);
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          background 180ms ease,
          box-shadow 180ms ease,
          opacity 180ms ease;
        cursor: pointer;
      }

      .notify-button:hover,
      .tv-button:hover,
      .mini-button:hover {
        transform: translateY(-1px);
        border-color: rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.09);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          0 16px 34px rgba(0, 0, 0, 0.28);
      }

      .notify-button.is-disabled {
        opacity: 0.55;
        pointer-events: none;
      }

      .player-card,
      .tv-panel {
        border-radius: var(--radius);
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: var(--shadow);
        -webkit-backdrop-filter: blur(20px) saturate(120%);
        backdrop-filter: blur(20px) saturate(120%);
        overflow: hidden;
      }

      .player-stage {
        position: relative;
      }

      iframe {
        display: block;
        width: 100%;
        height: min(76vh, 880px);
        border: 0;
        background: transparent !important;
        color-scheme: dark;
      }

      .tv-button {
        position: absolute;
        right: 14px;
        bottom: 14px;
        z-index: 2;
        background: rgba(5, 8, 18, 0.72);
      }

      .tv-panel {
        display: none;
        padding: 16px;
      }

      .tv-panel.is-open {
        display: grid;
        gap: 12px;
      }

      .tv-panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .tv-panel h2 {
        margin: 0;
        font-size: 18px;
        letter-spacing: -0.02em;
      }

      .tv-panel p {
        margin: 0;
        color: var(--muted);
      }

      .tv-video {
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.42);
      }

      .footnote {
        color: rgba(238, 244, 255, 0.56);
        font-size: 13px;
      }

      @media (max-width: 640px) {
        .page {
          padding: 14px 10px 18px;
        }

        .notify-row {
          width: 100%;
        }

        .notify-button {
          flex: 1 1 0;
        }

        iframe {
          height: 78vh;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="shell">
        <header class="brand">
          <img src="{{ furatic_logo_wide_url }}" alt="FURATIC" decoding="async">
          <div class="notify-row">
            <a
              class="notify-button{% if not discord_invite_url %} is-disabled{% endif %}"
              href="{% if discord_invite_url %}{{ discord_invite_url }}{% else %}#{% endif %}"
              target="_blank"
              rel="noopener noreferrer"
            >
              Discord invite
            </a>
            <a
              class="notify-button{% if not vrchat_group_url %} is-disabled{% endif %}"
              href="{% if vrchat_group_url %}{{ vrchat_group_url }}{% else %}#{% endif %}"
              target="_blank"
              rel="noopener noreferrer"
            >
              VRChat group
            </a>
          </div>
        </header>

        <section class="player-card">
          <div class="player-stage">
            <iframe
              src="/p/"
              title="FURATIC queue player"
              allow="autoplay"
              allowtransparency="true"
            ></iframe>
            <button class="tv-button" id="tv-toggle" type="button">TV</button>
          </div>
        </section>

        <section class="tv-panel" id="tv-panel" aria-hidden="true">
          <div class="tv-panel-head">
            <div>
              <h2>Live TV feed</h2>
              <p>Open the stream without leaving the queue page.</p>
            </div>
            <button class="mini-button" id="tv-close" type="button">Close</button>
          </div>
          <video id="tv-player" class="tv-video" controls playsinline preload="none"></video>
          {% if hls_url %}
          <div class="footnote">Stream source: {{ hls_url }}</div>
          {% endif %}
        </section>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
    <script>
      (function () {
        const hlsUrl = "{{ hls_url|default_if_none:''|escapejs }}";
        const panel = document.getElementById("tv-panel");
        const toggleButton = document.getElementById("tv-toggle");
        const closeButton = document.getElementById("tv-close");
        const video = document.getElementById("tv-player");
        let hlsInstance = null;
        let hasLoadedStream = false;

        function ensureStream() {
          if (hasLoadedStream || !hlsUrl) {
            return;
          }
          hasLoadedStream = true;

          if (video.canPlayType("application/vnd.apple.mpegurl")) {
            video.src = hlsUrl;
            return;
          }

          if (window.Hls && window.Hls.isSupported()) {
            hlsInstance = new window.Hls({
              enableWorker: true,
              lowLatencyMode: true,
              backBufferLength: 20,
            });
            hlsInstance.loadSource(hlsUrl);
            hlsInstance.attachMedia(video);
          }
        }

        function setOpen(open) {
          panel.classList.toggle("is-open", open);
          panel.setAttribute("aria-hidden", open ? "false" : "true");
          toggleButton.textContent = open ? "TV · hide" : "TV";
          if (open) {
            ensureStream();
          } else {
            video.pause();
          }
        }

        if (!hlsUrl) {
          toggleButton.disabled = true;
          toggleButton.textContent = "TV unavailable";
          return;
        }

        toggleButton.addEventListener("click", function () {
          setOpen(!panel.classList.contains("is-open"));
        });

        closeButton.addEventListener("click", function () {
          setOpen(false);
        });
      })();

      async function pollMode() {
        try {
          const response = await fetch("/api/site-mode/", { cache: "no-store" });
          if (!response.ok) return;
          const data = await response.json();
          if (data.mode === "afterhours") {
            window.location.href = "/afterhours/";
          }
        } catch (_error) {
          // silent retry
        }
      }

      setInterval(pollMode, 14000);
    </script>
  </body>
</html>
