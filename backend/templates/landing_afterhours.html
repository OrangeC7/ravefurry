<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FURATIC After Hours</title>
    <meta name="theme-color" content="#050816">
    <link rel="icon" href="{{ furatic_logo_url }}" type="image/svg+xml">
    <link rel="shortcut icon" href="{{ furatic_logo_url }}" type="image/svg+xml">
    <link rel="mask-icon" href="{{ furatic_logo_url }}" color="#008ef8">
    <style>
      :root {
        color-scheme: dark;
        --bg: #050816;
        --bg-top: #091022;
        --bg-bottom: #03040b;
        --text: #eef4ff;
        --muted: rgba(238, 244, 255, 0.72);
        --line: rgba(255, 255, 255, 0.12);
        --panel: rgba(7, 10, 22, 0.30);
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.48);
        --radius: 28px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background:
          radial-gradient(circle at top, rgba(16, 24, 52, 0.88) 0%, rgba(5, 8, 22, 0.96) 48%, rgba(3, 4, 11, 1) 100%),
          linear-gradient(180deg, var(--bg-top) 0%, var(--bg) 56%, var(--bg-bottom) 100%);
        color: var(--text);
        font-family: Inter, Roboto, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
        background-attachment: fixed;
      }

      .page {
        min-height: 100svh;
        padding: 18px 16px 24px;
        display: grid;
        place-items: center;
      }

      .shell {
        width: min(100%, 920px);
        border-radius: var(--radius);
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: var(--shadow);
        -webkit-backdrop-filter: blur(20px) saturate(120%);
        backdrop-filter: blur(20px) saturate(120%);
        padding: 28px 22px;
        display: grid;
        justify-items: center;
        gap: 14px;
        text-align: center;
      }

      .shell img {
        display: block;
        width: min(100%, 520px);
        max-width: 100%;
        height: auto;
        margin: 0 auto;
        filter:
          drop-shadow(0 16px 38px rgba(0, 0, 0, 0.30))
          drop-shadow(0 0 18px rgba(0, 142, 248, 0.12));
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 52px);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: clamp(15px, 2vw, 18px);
        line-height: 1.55;
        max-width: 44rem;
      }

      .notify-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin-top: 4px;
      }

      .notify-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
        border-radius: 14px;
        color: var(--text);
        text-decoration: none;
        font: inherit;
        font-weight: 700;
        letter-spacing: 0.01em;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.06);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.04),
          0 12px 28px rgba(0, 0, 0, 0.22);
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          background 180ms ease,
          box-shadow 180ms ease,
          opacity 180ms ease;
      }

      .notify-button:hover {
        transform: translateY(-1px);
        border-color: rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.09);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          0 16px 34px rgba(0, 0, 0, 0.28);
      }

      .notify-button.is-disabled {
        opacity: 0.55;
        pointer-events: none;
      }

      @media (max-width: 640px) {
        .page {
          padding: 14px 10px 18px;
        }

        .shell {
          padding: 22px 16px;
        }

        .notify-row {
          width: 100%;
        }

        .notify-button {
          flex: 1 1 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="shell" aria-labelledby="title">
        <img src="{{ furatic_logo_url }}" alt="FURATIC logo" decoding="async">
        <h1 id="title">FURATIC is offline for now.</h1>
        <p>This page switches back automatically when the event starts again.</p>

        <div class="notify-row">
          <a
            class="notify-button{% if not discord_invite_url %} is-disabled{% endif %}"
            href="{% if discord_invite_url %}{{ discord_invite_url }}{% else %}#{% endif %}"
            target="_blank"
            rel="noopener noreferrer"
          >
            Discord invite
          </a>
          <a
            class="notify-button{% if not vrchat_group_url %} is-disabled{% endif %}"
            href="{% if vrchat_group_url %}{{ vrchat_group_url }}{% else %}#{% endif %}"
            target="_blank"
            rel="noopener noreferrer"
          >
            VRChat group
          </a>
        </div>
      </section>
    </main>

    <script>
      async function pollMode() {
        try {
          const response = await fetch("/api/site-mode/", { cache: "no-store" });
          if (!response.ok) return;
          const data = await response.json();
          if (data.mode === "event") {
            window.location.href = "/";
          }
        } catch (_error) {
          // silent retry
        }
      }

      setInterval(pollMode, 14000);
    </script>
  </body>
</html>
