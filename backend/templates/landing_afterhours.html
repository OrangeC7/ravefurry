<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FURATIC After Hours</title>
    <meta name="theme-color" content="#050816">
    <link rel="icon" href="https://raw.githubusercontent.com/OrangeC7/raveberry/150947c7bb60bab91b7383a3089319fc1bc74e99/FuraticLogo.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="https://raw.githubusercontent.com/OrangeC7/raveberry/150947c7bb60bab91b7383a3089319fc1bc74e99/FuraticLogo.svg" type="image/svg+xml">
    <link rel="mask-icon" href="https://raw.githubusercontent.com/OrangeC7/raveberry/150947c7bb60bab91b7383a3089319fc1bc74e99/FuraticLogo.svg" color="#008ef8">
    <style>
      :root {
        color-scheme: dark;
        --bg: #050816;
        --bg-top: #091022;
        --bg-bottom: #03040b;
        --text: #eef4ff;
        --muted: rgba(238, 244, 255, 0.76);
        --muted-2: rgba(238, 244, 255, 0.58);
        --white-line: rgba(255, 255, 255, 0.11);
        --white-soft: rgba(255, 255, 255, 0.06);
        --panel: rgba(9, 14, 30, 0.52);
        --panel-deeper: rgba(7, 10, 22, 0.66);
        --panel-shadow: 0 28px 120px rgba(0, 0, 0, 0.55);
        --radius: 30px;
        --cyan: 0, 142, 248;
        --orange: 222, 104, 0;
        --green: 74, 227, 0;
        --magenta: 200, 0, 224;
      }

      * {
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, Roboto, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      }

      body {
        position: relative;
        overflow-x: hidden;
      }

      #aurora {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        z-index: 0;
        background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg) 56%, var(--bg-bottom) 100%);
        transform: translateZ(0);
      }

      .noise,
      .vignette {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
      }

      .noise {
        opacity: 0.045;
        background-image:
          radial-gradient(circle at 20% 20%, rgba(255,255,255,0.12) 0, rgba(255,255,255,0) 34%),
          radial-gradient(circle at 80% 0%, rgba(255,255,255,0.08) 0, rgba(255,255,255,0) 28%);
        mix-blend-mode: screen;
      }

      .vignette {
        background:
          radial-gradient(circle at 50% -10%, rgba(255,255,255,0.06), transparent 42%),
          radial-gradient(circle at 50% 50%, transparent 0%, transparent 54%, rgba(0,0,0,0.22) 100%);
      }

      .page {
        position: relative;
        z-index: 2;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: clamp(18px, 3vw, 40px);
      }

      .shell {
        width: min(100%, 960px);
        opacity: 0;
        transform: translateY(18px) scale(0.985);
        transition:
          opacity 720ms cubic-bezier(0.22, 1, 0.36, 1),
          transform 900ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      body.is-ready .shell {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      .card {
        position: relative;
        overflow: hidden;
        isolation: isolate;
        border-radius: var(--radius);
        padding: clamp(24px, 4vw, 44px);
        background: rgba(6, 10, 22, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.10);
        box-shadow: var(--panel-shadow);
        -webkit-backdrop-filter: blur(28px) saturate(118%);
        backdrop-filter: blur(28px) saturate(118%);
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -2;
        background: rgba(255, 255, 255, 0.018);
        opacity: 1;
      }

      .card::after {
        content: "";
        position: absolute;
        inset: 1px;
        border-radius: calc(var(--radius) - 1px);
        z-index: -1;
        background:
          radial-gradient(circle at top left, rgba(255,255,255,0.10), transparent 30%),
          linear-gradient(180deg, rgba(255,255,255,0.018), rgba(255,255,255,0));
        opacity: 0.8;
        pointer-events: none;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 999px;
        font-size: 12px;
        line-height: 1;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.92);
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
        opacity: 0;
        transform: translateY(10px);
        transition:
          opacity 650ms cubic-bezier(0.22, 1, 0.36, 1) 130ms,
          transform 720ms cubic-bezier(0.22, 1, 0.36, 1) 130ms;
      }

      body.is-ready .status {
        opacity: 1;
        transform: translateY(0);
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(135deg, rgba(var(--orange), 1), rgba(var(--magenta), 1));
        box-shadow:
          0 0 0 0 rgba(var(--orange), 0.45),
          0 0 18px rgba(var(--orange), 0.58);
        animation: pulse 2.3s ease-in-out infinite;
        flex: none;
      }

      .hero {
        display: grid;
        grid-template-columns: 128px 1fr;
        gap: clamp(18px, 3vw, 28px);
        align-items: center;
        margin-top: 22px;
      }

      .logo-wrap {
        position: relative;
        width: 128px;
        height: 128px;
        display: grid;
        place-items: center;
        border-radius: 28px;
        background:
          radial-gradient(circle at 30% 20%, rgba(255,255,255,0.09), transparent 42%),
          linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
        border: 1px solid rgba(255, 255, 255, 0.10);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.05),
          0 18px 50px rgba(0,0,0,0.30);
        overflow: hidden;
        transform: translateZ(0);
      }

      .logo-wrap::before {
        content: "";
        position: absolute;
        inset: -22%;
        background:
          conic-gradient(
            from 180deg,
            rgba(var(--cyan), 0.00),
            rgba(var(--cyan), 0.18),
            rgba(var(--magenta), 0.18),
            rgba(var(--orange), 0.18),
            rgba(var(--green), 0.16),
            rgba(var(--cyan), 0.00)
          );
        filter: blur(20px);
        opacity: 0.9;
        animation: haloSpin 18s linear infinite;
      }

      .logo-wrap::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(135deg, rgba(255,255,255,0.14), transparent 34%),
          radial-gradient(circle at 70% 85%, rgba(255,255,255,0.06), transparent 36%);
        pointer-events: none;
      }

      .logo-wrap img {
        position: relative;
        z-index: 1;
        width: 82px;
        height: 82px;
        display: block;
        filter:
          drop-shadow(0 10px 30px rgba(0,0,0,0.26))
          drop-shadow(0 0 20px rgba(var(--cyan), 0.18));
        animation: logoFloat 6.5s ease-in-out infinite;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(36px, 6vw, 64px);
        line-height: 0.95;
        letter-spacing: -0.05em;
        text-wrap: balance;
      }

      .lead {
        margin: 0;
        max-width: 58ch;
        color: var(--muted);
        font-size: clamp(16px, 2.15vw, 21px);
        line-height: 1.62;
        text-wrap: pretty;
      }

      .meta {
        margin-top: 22px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        min-height: 42px;
        padding: 11px 14px;
        border-radius: 16px;
        font-size: 13px;
        line-height: 1.35;
        color: var(--muted);
        background: rgba(255,255,255,0.042);
        border: 1px solid rgba(255,255,255,0.07);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.025);
      }

      .pill strong {
        color: var(--text);
        font-weight: 700;
      }

      .pill-mark {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: rgba(255,255,255,0.88);
        opacity: 0.85;
        flex: none;
      }

      .foot {
        margin-top: 18px;
        color: var(--muted-2);
        font-size: 13px;
        letter-spacing: 0.01em;
      }

      @keyframes pulse {
        0%, 100% {
          box-shadow:
            0 0 0 0 rgba(var(--orange), 0.45),
            0 0 18px rgba(var(--orange), 0.58);
          transform: scale(1);
        }
        50% {
          box-shadow:
            0 0 0 10px rgba(var(--orange), 0),
            0 0 24px rgba(var(--magenta), 0.50);
          transform: scale(1.05);
        }
      }

      @keyframes logoFloat {
        0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
        50% { transform: translateY(-4px) scale(1.015) rotate(-1deg); }
      }

      @keyframes haloSpin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @media (max-width: 760px) {
        .page {
          align-items: center;
        }

        .hero {
          grid-template-columns: 1fr;
        }

        .logo-wrap {
          width: 104px;
          height: 104px;
          border-radius: 24px;
        }

        .logo-wrap img {
          width: 68px;
          height: 68px;
        }
      }

      @media (max-width: 520px) {
        .card {
          padding: 22px 18px 20px;
          border-radius: 24px;
        }

        .meta {
          gap: 10px;
        }

        .pill {
          width: 100%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .shell,
        .status {
          transition: none;
        }

        .status-dot,
        .logo-wrap::before,
        .logo-wrap img {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="aurora" aria-hidden="true"></canvas>
    <div class="noise" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>

    <main class="page">
      <section class="shell" aria-labelledby="title">
        <div class="card">

          <div class="hero">
            <div class="logo-wrap">
              <img
                src="https://raw.githubusercontent.com/OrangeC7/raveberry/150947c7bb60bab91b7383a3089319fc1bc74e99/FuraticLogo.svg"
                alt="FURATIC logo"
                decoding="async"
              >
            </div>

            <div>
              <h1 id="title">FURATIC is offline for now.</h1>
              <p class="lead">
                Pass The Aux is not active right now.
                When the event goes live again, this page will switch back automatically.
              </p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      (function () {
        const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const canvas = document.getElementById("aurora");
        const ctx = canvas.getContext("2d", { alpha: false, desynchronized: true });

        let width = 0;
        let height = 0;
        let dpr = 1;
        let rafId = 0;

        const orbs = [
          {
            color: [0, 142, 248],
            radius: 336,
            alpha: 0.24,
            xMulA: 0.28,
            xMulB: 0.12,
            yMulA: 0.23,
            yMulB: 0.07,
            speedA: 0.13,
            speedB: 0.23,
            speedC: 0.16,
            speedD: 0.10,
            phaseA: 0.2,
            phaseB: 1.7,
            phaseC: 2.6,
            phaseD: 0.5
          },
          {
            color: [200, 0, 224],
            radius: 308,
            alpha: 0.22,
            xMulA: 0.24,
            xMulB: 0.10,
            yMulA: 0.25,
            yMulB: 0.07,
            speedA: 0.10,
            speedB: 0.20,
            speedC: 0.15,
            speedD: 0.10,
            phaseA: 2.3,
            phaseB: 0.7,
            phaseC: 1.2,
            phaseD: 2.1
          },
          {
            color: [222, 104, 0],
            radius: 272,
            alpha: 0.18,
            xMulA: 0.20,
            xMulB: 0.13,
            yMulA: 0.20,
            yMulB: 0.09,
            speedA: 0.14,
            speedB: 0.18,
            speedC: 0.12,
            speedD: 0.08,
            phaseA: 1.0,
            phaseB: 2.8,
            phaseC: 0.3,
            phaseD: 1.6
          },
          {
            color: [74, 227, 0],
            radius: 212,
            alpha: 0.09,
            xMulA: 0.14,
            xMulB: 0.07,
            yMulA: 0.15,
            yMulB: 0.06,
            speedA: 0.08,
            speedB: 0.15,
            speedC: 0.10,
            speedD: 0.06,
            phaseA: 3.2,
            phaseB: 1.1,
            phaseC: 1.8,
            phaseD: 2.7
          },
          {
            color: [0, 142, 248],
            radius: 214,
            alpha: 0.11,
            xMulA: 0.12,
            xMulB: 0.16,
            yMulA: 0.11,
            yMulB: 0.08,
            speedA: 0.17,
            speedB: 0.12,
            speedC: 0.11,
            speedD: 0.14,
            phaseA: 1.4,
            phaseB: 2.4,
            phaseC: 0.9,
            phaseD: 3.1
          },
          {
            color: [222, 104, 0],
            radius: 196,
            alpha: 0.10,
            xMulA: 0.17,
            xMulB: 0.09,
            yMulA: 0.12,
            yMulB: 0.11,
            speedA: 0.09,
            speedB: 0.16,
            speedC: 0.18,
            speedD: 0.12,
            phaseA: 2.9,
            phaseB: 0.4,
            phaseC: 2.2,
            phaseD: 1.3
          }
        ];

        function resizeCanvas() {
          width = window.innerWidth;
          height = window.innerHeight;
          dpr = Math.min(window.devicePixelRatio || 1, 1.6);

          canvas.width = Math.round(width * dpr);
          canvas.height = Math.round(height * dpr);
          canvas.style.width = width + "px";
          canvas.style.height = height + "px";

          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function drawBase() {
          const gradient = ctx.createLinearGradient(0, 0, 0, height);
          gradient.addColorStop(0, "#091022");
          gradient.addColorStop(0.58, "#050816");
          gradient.addColorStop(1, "#03040b");
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, width, height);

          const centerGlow = ctx.createRadialGradient(
            width * 0.5,
            height * 0.35,
            0,
            width * 0.5,
            height * 0.35,
            Math.max(width, height) * 0.75
          );
          centerGlow.addColorStop(0, "rgba(255,255,255,0.030)");
          centerGlow.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = centerGlow;
          ctx.fillRect(0, 0, width, height);
        }

        function drawOrb(x, y, radius, rgb, alpha) {
          const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
          gradient.addColorStop(0, `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${alpha})`);
          gradient.addColorStop(0.38, `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${alpha * 0.64})`);
          gradient.addColorStop(0.72, `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${alpha * 0.18})`);
          gradient.addColorStop(1, `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, 0)`);
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(x, y, radius, 0, Math.PI * 2);
          ctx.fill();
        }

        function render(now) {
          const t = now * 0.0014;
          drawBase();

          ctx.globalCompositeOperation = "screen";

          for (const orb of orbs) {
            const x = width * (
              0.5
              + orb.xMulA * Math.sin(t * orb.speedA + orb.phaseA)
              + orb.xMulB * Math.sin(t * orb.speedB + orb.phaseB)
            );

            const y = height * (
              0.5
              + orb.yMulA * Math.cos(t * orb.speedC + orb.phaseC)
              + orb.yMulB * Math.sin(t * orb.speedD + orb.phaseD)
            );

            const radius = orb.radius * (
              1
              + 0.09 * Math.sin(t * (orb.speedA + orb.speedC + orb.speedD * 0.5) + orb.phaseB)
            );

            drawOrb(x, y, radius, orb.color, orb.alpha);
          }

          ctx.globalCompositeOperation = "source-over";

          const scrim = ctx.createLinearGradient(0, 0, 0, height);
          scrim.addColorStop(0, "rgba(0,0,0,0.08)");
          scrim.addColorStop(0.45, "rgba(0,0,0,0.02)");
          scrim.addColorStop(1, "rgba(0,0,0,0.16)");
          ctx.fillStyle = scrim;
          ctx.fillRect(0, 0, width, height);

          rafId = window.requestAnimationFrame(render);
        }

        resizeCanvas();

        if (prefersReducedMotion) {
          drawBase();
          ctx.globalCompositeOperation = "screen";
          drawOrb(width * 0.24, height * 0.28, 260, [0, 142, 248], 0.18);
          drawOrb(width * 0.76, height * 0.24, 250, [200, 0, 224], 0.18);
          drawOrb(width * 0.28, height * 0.78, 220, [74, 227, 0], 0.10);
          drawOrb(width * 0.78, height * 0.74, 240, [222, 104, 0], 0.14);
          ctx.globalCompositeOperation = "source-over";
        } else {
          rafId = window.requestAnimationFrame(render);
        }

        let resizeTimer = 0;
        window.addEventListener("resize", function () {
          window.clearTimeout(resizeTimer);
          resizeTimer = window.setTimeout(function () {
            resizeCanvas();
            if (prefersReducedMotion) {
              drawBase();
              ctx.globalCompositeOperation = "screen";
              drawOrb(width * 0.24, height * 0.28, 260, [0, 142, 248], 0.18);
              drawOrb(width * 0.76, height * 0.24, 250, [200, 0, 224], 0.18);
              drawOrb(width * 0.28, height * 0.78, 220, [74, 227, 0], 0.10);
              drawOrb(width * 0.78, height * 0.74, 240, [222, 104, 0], 0.14);
              ctx.globalCompositeOperation = "source-over";
            }
          }, 80);
        }, { passive: true });

        window.addEventListener("beforeunload", function () {
          if (rafId) {
            window.cancelAnimationFrame(rafId);
          }
        });

        window.requestAnimationFrame(function () {
          document.body.classList.add("is-ready");
        });
      })();

      async function pollMode() {
        try {
          const response = await fetch("/api/site-mode/", { cache: "no-store" });
          if (!response.ok) return;
          const data = await response.json();
          if (data.mode === "event") {
            window.location.href = "/";
          }
        } catch (_error) {
          // silent retry
        }
      }

      setInterval(pollMode, 14000);
    </script>
  </body>
</html>
